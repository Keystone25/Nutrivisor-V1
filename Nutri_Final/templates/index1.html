<!DOCTYPE html>
<html>
<head>
    <title>NutriVisor</title>

    <style>
        body {
            background: linear-gradient(135deg, #e3fdf5, #ffe6fa);
            font-family: "Segoe UI", sans-serif;
            text-align: center;
        }

        h2 {
            font-weight: 600;
            margin-top: 20px;
        }

        .camera-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 750px;
            margin: 30px auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        img {
            border-radius: 15px;
            width: 100%;
            max-width: 600px;
            margin-top: 15px;
        }

        /* POPUP */
        .popup-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 340px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            display: none;
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            from { transform: translate(-50%, -60%) scale(0.7); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .nutri-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .nutri-box {
            background: #f7f7f7;
            padding: 8px;
            border-radius: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-green {
            background: #00c853;
            color: white;
        }

        .btn-red {
            background: #ff5252;
            color: white;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            background: #f1f1f1;
        }
    </style>
</head>

<body>

<div class="camera-card">
    <h2>🍏 NutriVisor AI Scanner</h2>
    <p style="color:#555;">Point camera at food</p>
    <button onclick="goHome()" class="back-btn">← Home</button>

    <img src="{{ url_for('video_feed') }}">
</div>

<!-- POPUP -->
<div id="popup" class="popup-card">

    <h3 id="foodName"></h3>

    <div id="nutritionBlock"></div>
    <div id="diabetic-status" style="margin-top:10px;"></div>
    <p id="suggestion"></p>

    <button class="btn btn-green" onclick="scanAgain()">Scan Again</button>

</div>



<script>

document.addEventListener("visibilitychange", function () {
    if (!document.hidden) {
        let img = document.querySelector("img");
        img.src = "/video_feed?" + new Date().getTime();
    }
});

let shown = false;

setInterval(async () => {
    const res = await fetch('/detect_status');
    const data = await res.json();

    if (data.detected && !shown) {

        shown = true;

        // FOOD NAME
        document.getElementById("foodName").innerText = "🍽 " + data.food;

        // NUTRITION
        if (data.nutrition) {
            document.getElementById("nutritionBlock").innerHTML = `
                <div class="nutri-grid">
                    <div class="nutri-box">🔥 Cal ${data.nutrition.calories}</div>
                    <div class="nutri-box">🥩 Protein ${data.nutrition.protein}</div>
                    <div class="nutri-box">🍞 Carbs ${data.nutrition.carbs}</div>
                    <div class="nutri-box">🧈 Fat ${data.nutrition.fat}</div>
                </div>
            `;

            document.getElementById("suggestion").innerText =
                "✨ " + data.nutrition.suggestion;

        } else {
            document.getElementById("nutritionBlock").innerHTML =
                "<p>No data found</p>";
        }

        // DIABETIC STATUS (merged here — NO second API call)
        if (data.diabetic) {
            let status = data.diabetic.status;
            let message = data.diabetic.message;

            let color = "gray";
            if (status === "safe") color = "green";
            if (status === "moderate") color = "orange";
            if (status === "avoid") color = "red";

            document.getElementById("diabetic-status").innerHTML =
                `<b style="color:${color}">Diabetic Check: ${message}</b>`;
        }

        // SHOW POPUP
        document.getElementById("popup").style.display = "block";
    }

}, 800);


function scanAgain() {
    fetch('/reset');
    location.reload();
}

window.addEventListener("beforeunload", function () {
    navigator.sendBeacon('/stop_camera');
});


function goHome() {
    fetch('/stop_camera');
    fetch('/reset');
    window.location.href = "/U_Home_page";
}

</script>

</body>
</html>
